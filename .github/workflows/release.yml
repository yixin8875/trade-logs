name: Build And Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-amd64
            archive: tar.gz
          - os: macos-latest
            platform: macos-amd64
            archive: tar.gz
          - os: windows-latest
            platform: windows-amd64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
          else
            sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev
          fi

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build App
        run: wails build -clean

      - name: Archive Build Output (Unix)
        if: runner.os != 'Windows'
        run: |
          ARCHIVE="trade-logs-${{ matrix.platform }}.${{ matrix.archive }}"
          tar -czf "$ARCHIVE" -C build/bin .

      - name: Archive Build Output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "trade-logs-${{ matrix.platform }}.${{ matrix.archive }}"
          Compress-Archive -Path build/bin/* -DestinationPath $archive

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trade-logs-${{ matrix.platform }}
          path: trade-logs-${{ matrix.platform }}.${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true
